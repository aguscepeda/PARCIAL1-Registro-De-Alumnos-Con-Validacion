<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumnos - PARCIAL 1</title>
    <link rel="stylesheet" href="css/components/index.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon/formularioFavIcon.png">
</head>
<body>
    <h1>Registro de Alumnos</h1>  

    <form id="formularioRegistro"> 
        <label for="nombre">Nombre:</label>
        <input id="nombre" type="text" placeholder="Juan" required>

        <label for="apellido">Apellido:</label>
        <input id="apellido" type="text" placeholder="Pérez" required>

        <label for="edad">Edad:</label>
        <input id="edad" type="number" placeholder="20" required>

        <label for="curso">Curso:</label>
        <input id="curso" type="text" placeholder="3-A" required>

        <button type="submit">Registrar</button>
    </form>

    <p>Total alumnos: <span id="totalAlumnos">0</span></p> 
    <br><br>

    <h2>Lista de Alumnos Registrados Exitosamente:</h2>
    
    <table border="1"> 
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Curso</th>
            </tr>
        </thead>
        <tbody id="listaAlumnosRegistrados"></tbody> 
    </table>

    <script src="js/scripts.js"></script>            
</body>
</html>
